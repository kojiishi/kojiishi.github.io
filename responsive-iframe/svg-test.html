<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG Embedding Test</title>
    <style>
        section { margin-bottom: 2em; }
        iframe, object { border: 1px solid black; }
    </style>
</head>
<body>
    <h1>SVG Embedding Test</h1>
    
    <section>
        <h2>svg-content.svg (Width/Height)</h2>
        <div>
            <h3>Using &lt;iframe&gt;</h3>
            <iframe src="resources/svg-content.svg"></iframe>
        </div>
        <div>
            <h3>Using &lt;object&gt;</h3>
            <object data="resources/svg-content.svg" type="image/svg+xml"></object>
        </div>
        <div>
            <h3>Using &lt;img&gt;</h3>
            <img src="resources/svg-content.svg">
        </div>
    </section>

    <section>
        <h2>svg-content-viewbox.svg (viewBox)</h2>
        <div>
            <h3>Using &lt;iframe&gt;</h3>
            <iframe src="resources/svg-content-viewbox.svg"></iframe>
        </div>
        <div>
            <h3>Using &lt;object&gt;</h3>
            <object data="resources/svg-content-viewbox.svg" type="image/svg+xml"></object>
        </div>
        <div>
            <h3>Using &lt;img&gt;</h3>
            <img src="resources/svg-content-viewbox.svg">
        </div>
    </section>
</body>
</html>
